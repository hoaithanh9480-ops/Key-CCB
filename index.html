<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Bản quyền & Người dùng Độc lập</title>
  <style>
    body {font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px;}
    h1 {text-align:center; margin-bottom:20px;}
    
    /* Giao diện chia 2 cột */
    .dashboard-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .column-left, .column-right {
      flex: 1;
      min-width: 320px;
    }
    
    .form-container, .table-container {
      background:#fff; 
      padding:20px; 
      border-radius:8px; 
      box-shadow:0 2px 5px rgba(0,0,0,0.1); 
      margin-bottom:20px;
    }
    .form-group {margin-bottom:15px;}
    label {display:block; margin-bottom:5px; font-weight:bold;}
    input {width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;}
    button {padding:10px 15px; background:#3498db; color:#fff; border:none; border-radius:4px; cursor:pointer;}
    button:hover {background:#2980b9;}
    
    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }
    table {width:100%; border-collapse:collapse; margin-top:10px;}
    th, td {border:1px solid #ddd; padding:10px; text-align:left;}
    th {background:#f2f2f2;}
    
    .key-used, .user-licensed {background:#d4edda;}
    .key-unused, .user-unlicensed {background:#fff3cd;}
    
    .copy-btn {
      padding: 5px 10px;
      margin-left: 5px;
      background: #5cb85c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .copy-btn:hover { background: #4cae4c; }
    
    .revoke-btn {
      padding: 5px 10px;
      background: #d9534f;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .revoke-btn:hover { background: #c9302c; }

    @media (max-width: 992px) {
      .dashboard-container { flex-direction: column; }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<h1>Hệ thống Quản lý Độc lập</h1>

<div class="dashboard-container">
  
  <div class="column-left">
    <div class="form-container">
      <h3>📝 Tạo mã bản quyền trống</h3>
      <div class="form-group">
        <label for="keyCount">Số lượng mã cần tạo</label>
        <input type="number" id="keyCount" value="5" min="1" max="1000">
      </div>
      <div class="form-group">
        <label for="keyLength">Độ dài mã (6-20 ký tự)</label>
        <input type="number" id="keyLength" value="8" min="6" max="20">
      </div>
      <button id="generateBtn">Tạo mã bản quyền</button>
    </div>

    <div class="table-container">
      <h3>📋 Danh sách mã bản quyền</h3>
      <div class="table-responsive" id="keysTable"></div>
    </div>
  </div>
  
  <div class="column-right">
    <div class="form-container" style="border-top: 4px solid #e67e22;">
      <h3>👥 Tạo tài khoản thường (Chưa kích hoạt)</h3>
      <div class="form-group">
        <label for="userCount">Số lượng User cần tạo</label>
        <input type="number" id="userCount" value="5" min="1" max="100">
      </div>
      <div class="form-group">
        <label for="userLength">Độ dài tên tài khoản</label>
        <input type="number" id="userLength" value="6" min="4" max="15">
      </div>
      <div class="form-group">
        <label for="userPass">Mật khẩu chung</label>
        <input type="text" id="userPass" value="123456">
      </div>
      <button id="generateUserBtn" style="background:#e67e22;">Tạo tài khoản thường</button>
    </div>

    <div class="table-container">
      <h3>👥 Danh sách User & Trạng thái sử dụng</h3>
      <div class="table-responsive" id="usersTable">
        <p>Đang tải dữ liệu người dùng...</p>
      </div>
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBiaG-H9SzpYQqr3YgOODG4SM2WEqmhwb8",
  authDomain: "hoi-ccb.firebaseapp.com",
  databaseURL: "https://hoi-ccb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hoi-ccb",
  storageBucket: "hoi-ccb.firebasestorage.app",
  messagingSenderId: "344971473549",
  appId: "1:344971473549:web:7d4db3d5d328401164e8c4"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Hàm sinh chuỗi ngẫu nhiên
function generateRandomString(len=8){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let res = "";
  for(let i=0;i<len;i++) res += chars.charAt(Math.floor(Math.random()*chars.length));
  return res;
}

// [CỘT 1] TẠO MÃ BẢN QUYỀN TRỐNG hoàn toàn tuân thủ quy tắc Rules ban đầu
async function createKeys(){
  const count = parseInt(document.getElementById('keyCount').value)||1;
  const length = parseInt(document.getElementById('keyLength').value)||8;
  const timestamp = new Date().toISOString(); // Rules yêu cầu generatedAt là String

  for(let i=0;i<count;i++){
    const key = generateRandomString(length);
    const data = { 
      generatedAt: timestamp, 
      used: false, 
      usedAt: null,
      usedBy: null,
      usedByEmail: null
    };
    await database.ref('licenseKeys/'+key).set(data);
  }
}
document.getElementById('generateBtn').addEventListener('click', createKeys);


// [CỘT 2] TẠO USER THƯỜNG TRỐNG (Trạng thái ban đầu: Chưa kích hoạt)
async function createUsersNormal() {
  const count = parseInt(document.getElementById('userCount').value) || 1;
  const length = parseInt(document.getElementById('userLength').value) || 6;
  const password = document.getElementById('userPass').value.trim() || "123456";

  const btn = document.getElementById('generateUserBtn');
  btn.disabled = true;
  btn.textContent = "⏳ Đang tạo...";

  try {
    for(let i=0; i<count; i++) {
      const randomUser = "user" + generateRandomString(length).toLowerCase();
      const email = `${randomUser}@gmail.com`;
      const customUid = "UID_" + generateRandomString(12); 

      // Khởi tạo cấu trúc chỉ có cụm license trống để tuân thủ cấu trúc Rules nguyên bản của bạn
      const userData = {
        license: {
          licensed: false,
          key: null,
          activatedAt: null
        }
        // Lưu ý: Không đẩy các trường tự tạo ngoài cấu trúc để tránh bị Rules chặn validate
      };
      await database.ref('users/' + customUid).set(userData);
    }
    alert(`✅ Đã tạo xong ${count} tài khoản trống thành công!`);
  } catch (error) {
    console.error(error);
    alert("❌ Lỗi: " + error.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Tạo tài khoản thường";
  }
}
document.getElementById('generateUserBtn').addEventListener('click', createUsersNormal);


// Hàm sao chép nhanh
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    alert("Đã sao chép: " + text);
  });
}

// Hàm hủy bản quyền (Reset trạng thái của cả hai bên về trống như cũ)
async function revokeLicense(key, btnElement) {
  if(!key || key === '---') return;
  if(confirm("Bạn có chắc chắn muốn huỷ bản quyền cho mã: " + key + "?")) {
    if(btnElement) { btnElement.disabled = true; btnElement.textContent = '⏳...'; }
    try {
      const snapshot = await database.ref('licenseKeys/' + key).get();
      if (snapshot.exists()) {
        const keyData = snapshot.val();
        const userId = keyData.usedBy;
        if (userId) {
          await database.ref('users/' + userId + '/license').update({
            licensed: false, key: null, activatedAt: null
          });
        }
      }
      await database.ref('licenseKeys/' + key).update({
        used: false, usedAt: null, usedBy: null, usedByEmail: null
      });
      alert("✅ Đã hủy liên kết bản quyền!");
    } catch (error) {
      alert("❌ Lỗi: " + error.message);
    }
  }
}

// Định dạng hiển thị ngày từ dạng String ISO hoặc dạng Number mã hóa của hệ thống
function formatTimeDisplay(timeData) {
  if(!timeData) return '---';
  const dateObj = new Date(timeData);
  return isNaN(dateObj.getTime()) ? '---' : dateObj.toLocaleString('vi-VN');
}

// REALTIME CỘT 1: Danh sách mã bản quyền
function initLicenseManager(){
  database.ref('licenseKeys').on('value', snap => {
    if(!snap.exists()){ document.getElementById('keysTable').innerHTML = '<p>Chưa có mã nào.</p>'; return; }
    const keys = snap.val();
    let html = `<table><thead><tr><th>Mã Bản Quyền</th><th>Trạng thái sử dụng</th><th>Hành động</th></tr></thead><tbody>`;
    Object.entries(keys).forEach(([k,v])=>{
      let statusText = '🔄 Trống (Chưa có ai nhập)';
      if(v.used){
        statusText = `🟢 <b>Đã dùng bởi User:</b> <br><small><code>${v.usedBy || 'Ẩn UID'}</code></small>`;
      }
      html += `<tr class="${v.used?'key-used':'key-unused'}">
        <td><code>${k}</code> <button class="copy-btn" data-copy="${k}">Copy</button></td>
        <td>${statusText}</td>
        <td>${v.used ? `<button class="revoke-btn" data-key="${k}">Thu hồi mã</button>` : '---'}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('keysTable').innerHTML = html;
    document.querySelectorAll('#keysTable .copy-btn').forEach(b => b.onclick = (e) => copyToClipboard(e.currentTarget.getAttribute('data-copy')));
    document.querySelectorAll('#keysTable .revoke-btn').forEach(b => b.onclick = (e) => revokeLicense(e.currentTarget.getAttribute('data-key'), e.currentTarget));
  });
}

// REALTIME CỘT 2: Danh sách User hệ thống
function initUserManager(){
  database.ref('users').on('value', snap => {
    if(!snap.exists()){ document.getElementById('usersTable').innerHTML = '<p>Chưa có người dùng.</p>'; return; }
    const users = snap.val();
    let html = `<table><thead><tr><th>UID Người Dùng</th><th>Quyền truy cập App</th><th>Mã Đang Sử Dụng</th><th>Thời gian kích hoạt</th></tr></thead><tbody>`;
    
    Object.entries(users).forEach(([uid, userVal]) => {
      const license = userVal.license || {};
      const isLicensed = license.licensed === true;
      const activatedKey = license.key || '---';
      const activeAt = license.activatedAt ? formatTimeDisplay(license.activatedAt) : '---';

      html += `<tr class="${isLicensed ? 'user-licensed' : 'user-unlicensed'}">
        <td>
          <code>${uid}</code> <button class="copy-btn" data-copy="${uid}">Copy UID</button>
        </td>
        <td><b>${isLicensed ? '🟢 ĐÃ KÍCH HOẠT VIP' : '🔴 Tài khoản thường'}</b></td>
        <td><code>${activatedKey}</code></td>
        <td><small>${activeAt}</small></td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('usersTable').innerHTML = html;
    document.querySelectorAll('#usersTable .copy-btn').forEach(b => b.onclick = (e) => copyToClipboard(e.currentTarget.getAttribute('data-copy')));
  });
}

// Khởi chạy hệ thống
initLicenseManager();
initUserManager();
</script>
</body>
</html>
