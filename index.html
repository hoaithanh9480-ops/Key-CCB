<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Bản quyền & Tạo User</title>
  <style>
    body {font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px;}
    h1 {text-align:center; margin-bottom:20px;}
    
    /* Giao diện chia 2 cột */
    .dashboard-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .column-left, .column-right {
      flex: 1;
      min-width: 320px;
    }
    
    .form-container, .table-container {
      background:#fff; 
      padding:20px; 
      border-radius:8px; 
      box-shadow:0 2px 5px rgba(0,0,0,0.1); 
      margin-bottom:20px;
    }
    .form-group {margin-bottom:15px;}
    label {display:block; margin-bottom:5px; font-weight:bold;}
    input {width:100%; padding:8px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;}
    button {padding:10px 15px; background:#3498db; color:#fff; border:none; border-radius:4px; cursor:pointer;}
    button:hover {background:#2980b9;}
    
    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }
    table {width:100%; border-collapse:collapse; margin-top:10px;}
    th, td {border:1px solid #ddd; padding:10px; text-align:left;}
    th {background:#f2f2f2;}
    
    .key-used, .user-licensed {background:#d4edda;}
    .key-unused, .user-unlicensed {background:#fff3cd;}
    
    .copy-btn {
      padding: 5px 10px;
      margin-left: 5px;
      background: #5cb85c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .copy-btn:hover { background: #4cae4c; }
    
    .revoke-btn {
      padding: 5px 10px;
      background: #d9534f;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .revoke-btn:hover { background: #c9302c; }

    @media (max-width: 992px) {
      .dashboard-container { flex-direction: column; }
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<h1>Hệ thống Quản lý Tổng thể</h1>

<div class="dashboard-container">
  
  <div class="column-left">
    <div class="form-container">
      <h3>📝 Tạo mã bản quyền trống (Chưa có User)</h3>
      <div class="form-group">
        <label for="keyCount">Số lượng mã</label>
        <input type="number" id="keyCount" value="5" min="1" max="1000">
      </div>
      <div class="form-group">
        <label for="keyLength">Độ dài mã (6-20 ký tự)</label>
        <input type="number" id="keyLength" value="8" min="6" max="20">
      </div>
      <button id="generateBtn">Tạo mã</button>
    </div>

    <div class="table-container">
      <h3>📋 Danh sách mã bản quyền</h3>
      <div class="table-responsive" id="keysTable"></div>
    </div>
  </div>
  
  <div class="column-right">
    <div class="form-container" style="border-top: 4px solid #2ecc71;">
      <h3>👥 Tạo tài khoản VIP hàng loạt</h3>
      <div class="form-group">
        <label for="userCount">Số lượng User muốn tạo</label>
        <input type="number" id="userCount" value="5" min="1" max="100">
      </div>
      <div class="form-group">
        <label for="userLength">Độ dài tên tài khoản (Không tính đuôi @gmail.com)</label>
        <input type="number" id="userLength" value="6" min="4" max="15">
      </div>
      <div class="form-group">
        <label for="userPass">Mật khẩu chung cho các tài khoản này</label>
        <input type="text" id="userPass" value="123456" placeholder="Nhập mật khẩu mặc định">
      </div>
      <button id="generateUserBtn" style="background:#2ecc71;">Tạo tài khoản & Kích hoạt sẵn</button>
    </div>

    <div class="table-container">
      <h3>👥 Danh sách User hệ thống</h3>
      <div class="table-responsive" id="usersTable">
        <p>Đang tải dữ liệu người dùng...</p>
      </div>
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBiaG-H9SzpYQqr3YgOODG4SM2WEqmhwb8",
  authDomain: "hoi-ccb.firebaseapp.com",
  databaseURL: "https://hoi-ccb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hoi-ccb",
  storageBucket: "hoi-ccb.firebasestorage.app",
  messagingSenderId: "344971473549",
  appId: "1:344971473549:web:7d4db3d5d328401164e8c4"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Hàm sinh chuỗi ngẫu nhiên (Dùng chung cho cả Key và Username)
function generateRandomString(len=8){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let res = "";
  for(let i=0;i<len;i++) res += chars.charAt(Math.floor(Math.random()*chars.length));
  return res;
}

// [Hàm Cột 1] Tạo mã bản quyền rời
async function createKeys(){
  const count = parseInt(document.getElementById('keyCount').value)||1;
  const length = parseInt(document.getElementById('keyLength').value)||8;
  const timestamp = new Date().toISOString();

  for(let i=0;i<count;i++){
    const key = generateRandomString(length);
    const data = { generatedAt: timestamp, used:false, usedAt:null };
    await database.ref('licenseKeys/'+key).set(data);
  }
}
document.getElementById('generateBtn').addEventListener('click', createKeys);


// [Hàm Cột 2 MỚI] TẠO USER HÀNG LOẠT VÀ TỰ ĐỘNG GÁN SẴN BẢN QUYỀN
async function createUsersBulk() {
  const count = parseInt(document.getElementById('userCount').value) || 1;
  const length = parseInt(document.getElementById('userLength').value) || 6;
  const password = document.getElementById('userPass').value.trim() || "123456";
  const timestamp = new Date().toISOString();

  if(!password) { alert("Vui lòng nhập mật khẩu!"); return; }

  const btn = document.getElementById('generateUserBtn');
  btn.disabled = true;
  btn.textContent = "⏳ Đang tạo...";

  try {
    for(let i=0; i<count; i++) {
      // 1. Tạo Username ngẫu nhiên dạng viết thường + kết hợp đuôi email (ví dụ: ccb39f82@gmail.com)
      const randomUser = "ccb" + generateRandomString(length).toLowerCase();
      const email = `${randomUser}@gmail.com`;
      
      // Tạo một chuỗi UID giả định ngẫu nhiên giống định dạng Firebase Auth để lưu trữ 
      const customUid = "USER_" + generateRandomString(12); 
      // Tạo một mã key riêng gán thẳng cho tài khoản này
      const licenseKey = "VIP" + generateRandomString(6);

      // 2. Đẩy dữ liệu vào nhánh 'users' (Đặt trạng thái Đã kích hoạt bản quyền)
      const userData = {
        email: email,
        password: password, // Lưu mật khẩu text để bạn dễ xuất ra giao cho khách
        uid: customUid,
        license: {
          activatedAt: timestamp,
          key: licenseKey,
          licensed: true
        }
      };
      await database.ref('users/' + customUid).set(userData);

      // 3. Đẩy đồng bộ sang nhánh 'licenseKeys' để báo mã này đã có người dùng
      const keyData = {
        generatedAt: timestamp,
        used: true,
        usedAt: timestamp,
        usedBy: customUid,
        usedByEmail: email
      };
      await database.ref('licenseKeys/' + licenseKey).set(keyData);
    }
    alert(`✅ Đã tạo thành công ${count} tài khoản VIP! Thao tác xem ở bảng bên dưới.`);
  } catch (error) {
    console.error(error);
    alert("❌ Lỗi: " + error.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Tạo tài khoản & Kích hoạt sẵn";
  }
}
document.getElementById('generateUserBtn').addEventListener('click', createUsersBulk);


// Hàm copy dữ liệu nhanh
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    alert("Đã sao chép: " + text);
  });
}

// Hủy bản quyền / Khóa tài khoản
async function revokeLicense(key, btnElement) {
  if(!key || key === '---') { alert("Không tìm thấy mã bản quyền hợp lệ để hủy!"); return; }
  if(confirm("Bạn có chắc chắn muốn huỷ bản quyền cho mã: " + key + "?")) {
    if(btnElement) { btnElement.disabled = true; btnElement.textContent = '⏳...'; }
    try {
      const snapshot = await database.ref('licenseKeys/' + key).get();
      if (snapshot.exists()) {
        const keyData = snapshot.val();
        const userId = keyData.usedBy;
        if (userId) {
          await database.ref('users/' + userId + '/license').update({
            licensed: false, key: null, activatedAt: null
          });
        }
      }
      await database.ref('licenseKeys/' + key).update({
        used: false, usedAt: null, usedBy: null, usedByEmail: null
      });
      alert("✅ Đã hủy trạng thái VIP thành công!");
    } catch (error) {
      alert("❌ Lỗi: " + error.message);
    }
  }
}

// Đọc Realtime danh sách mã bản quyền (Cột 1)
function initLicenseManager(){
  database.ref('licenseKeys').on('value', snap => {
    if(!snap.exists()){ document.getElementById('keysTable').innerHTML = '<p>Chưa có mã nào.</p>'; return; }
    const keys = snap.val();
    let html = `<table><thead><tr><th>Mã</th><th>Trạng thái sử dụng</th><th>Thao tác</th></tr></thead><tbody>`;
    Object.entries(keys).forEach(([k,v])=>{
      html += `<tr class="${v.used?'key-used':'key-unused'}">
        <td><code>${k}</code> <button class="copy-btn" data-copy="${k}">Copy</button></td>
        <td>${v.used ? `🟢 Cấp cho: <b>${v.usedByEmail||'Ẩn'}</b>` : '🔄 Chưa cấp'}</td>
        <td>${v.used ? `<button class="revoke-btn" data-key="${k}">Huỷ</button>` : '---'}</td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('keysTable').innerHTML = html;
    document.querySelectorAll('#keysTable .copy-btn').forEach(b => b.onclick = (e) => copyToClipboard(e.currentTarget.getAttribute('data-copy')));
    document.querySelectorAll('#keysTable .revoke-btn').forEach(b => b.onclick = (e) => revokeLicense(e.currentTarget.getAttribute('data-key'), e.currentTarget));
  });
}

// Đọc Realtime danh sách User (Cột 2)
function initUserManager(){
  database.ref('users').on('value', snap => {
    if(!snap.exists()){ document.getElementById('usersTable').innerHTML = '<p>Chưa có người dùng.</p>'; return; }
    const users = snap.val();
    let html = `<table><thead><tr><th>Tài khoản bàn giao</th><th>Mật khẩu</th><th>Trạng thái</th><th>Mã VIP</th><th>Hành động</th></tr></thead><tbody>`;
    
    Object.entries(users).forEach(([uid, userVal]) => {
      const license = userVal.license || {};
      const isLicensed = license.licensed === true;
      const activatedKey = license.key || '---';
      const email = userVal.email || '---';
      const pass = userVal.password || '---';

      html += `<tr class="${isLicensed ? 'user-licensed' : 'user-unlicensed'}">
        <td>
          <code>${email}</code> <button class="copy-btn" data-copy="${email}">Copy</button>
        </td>
        <td><code>${pass}</code></td>
        <td>${isLicensed ? '🟢 VIP' : '🔴 Hết hạn'}</td>
        <td><code>${activatedKey}</code></td>
        <td>
          ${isLicensed ? `<button class="revoke-btn" data-key="${activatedKey}">Khóa VIP</button>` : '---'}
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('usersTable').innerHTML = html;
    document.querySelectorAll('#usersTable .copy-btn').forEach(b => b.onclick = (e) => copyToClipboard(e.currentTarget.getAttribute('data-copy')));
    document.querySelectorAll('#usersTable .revoke-btn').forEach(b => b.onclick = (e) => revokeLicense(e.currentTarget.getAttribute('data-key'), e.currentTarget));
  });
}

// Chạy ứng dụng
initLicenseManager();
initUserManager();
</script>
</body>
</html>
