<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý bản quyền</title>
  <style>
    body {font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px;}
    h1 {text-align:center; margin-bottom:20px;}
    .form-container, .table-container {background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:20px;}
    .form-group {margin-bottom:15px;}
    label {display:block; margin-bottom:5px; font-weight:bold;}
    input {width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;}
    button {padding:10px 15px; background:#3498db; color:#fff; border:none; border-radius:4px; cursor:pointer;}
    button:hover {background:#2980b9;}
    table {width:100%; border-collapse:collapse; margin-top:10px;}
    th,td {border:1px solid #ddd; padding:10px; text-align:left;}
    th {background:#f2f2f2;}
    .key-used {background:#d4edda;}
    .key-unused {background:#fff3cd;}
    .copy-btn {
      padding: 5px 10px;
      margin-left: 10px;
      background: #5cb85c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .copy-btn:hover {
      background: #4cae4c;
    }
    .revoke-btn {
      padding: 5px 10px;
      margin-left: 5px;
      background: #d9534f;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .revoke-btn:hover {
      background: #c9302c;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
<h1>Quản lý mã bản quyền</h1>
<div class="form-container">
  <h3>📝 Tạo mã bản quyền mới</h3>
  <div class="form-group">
    <label for="keyCount">Số lượng mã</label>
    <input type="number" id="keyCount" value="5" min="1" max="1000">
  </div>
  <div class="form-group">
    <label for="keyLength">Độ dài mã (6-20 ký tự)</label>
    <input type="number" id="keyLength" value="8" min="6" max="20">
  </div>
  <button id="generateBtn">Tạo mã</button>
</div>
<div class="table-container">
  <h3>📋 Danh sách mã bản quyền</h3>
  <div id="keysTable"></div>
</div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBiaG-H9SzpYQqr3YgOODG4SM2WEqmhwb8",
  authDomain: "hoi-ccb.firebaseapp.com",
  databaseURL: "https://hoi-ccb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hoi-ccb",
  storageBucket: "hoi-ccb.firebasestorage.app",
  messagingSenderId: "344971473549",
  appId: "1:344971473549:web:7d4db3d5d328401164e8c4"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Hàm tạo key ngẫu nhiên
function generateKey(len=8){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let res = "";
  for(let i=0;i<len;i++) res += chars.charAt(Math.floor(Math.random()*chars.length));
  return res;
}

// Tạo và lưu key
async function createKeys(){
  const count = parseInt(document.getElementById('keyCount').value)||1;
  const length = parseInt(document.getElementById('keyLength').value)||8;
  const timestamp = new Date().toISOString();

  for(let i=0;i<count;i++){
    const key = generateKey(length);
    const data = { generatedAt: timestamp, used:false, usedAt:null };
    await database.ref('licenseKeys/'+key).set(data);
  }
  loadKeys();
}

document.getElementById('generateBtn').addEventListener('click', createKeys);

// Hàm sao chép mã vào clipboard
function copyKeyToClipboard(key) {
  navigator.clipboard.writeText(key).then(() => {
    alert("Đã sao chép: " + key);
  }).catch(err => {
    console.error('Không thể sao chép mã: ', err);
  });
}

// Hàm huỷ bản quyền
// Hàm huỷ bản quyền - SỬA LỖI ĐỒNG BỘ
async function revokeLicense(key) {
  if(confirm("Bạn có chắc chắn muốn huỷ bản quyền cho mã: " + key + "?\n\nMã này sẽ trở về trạng thái chưa sử dụng và người dùng sẽ mất quyền sử dụng.")) {
    try {
      // 1. Lấy thông tin key hiện tại
      const keySnapshot = await database.ref('licenseKeys/'+key).once('value');
      const keyData = keySnapshot.val();
      
      if (!keyData) {
        alert("Mã không tồn tại!");
        return;
      }
      
      const userId = keyData.usedBy;
      
      // 2. Cập nhật licenseKeys: RESET TOÀN BỘ về trạng thái chưa dùng
      await database.ref('licenseKeys/'+key).set({
        generatedAt: keyData.generatedAt,
        used: false,
        usedAt: null,
        usedBy: null,        // QUAN TRỌNG: xóa usedBy
        usedByEmail: null    // QUAN TRỌNG: xóa usedByEmail
      });
      
      // 3. Nếu có user đang dùng, cập nhật license của họ thành false
      if (userId) {
        // Lấy license hiện tại của user
        const userLicenseSnapshot = await database.ref('users/' + userId + '/license').once('value');
        const userLicense = userLicenseSnapshot.val();
        
        // Cập nhật licensed: false, nhưng giữ lại key và activatedAt để trace
        await database.ref('users/' + userId + '/license').set({
          licensed: false,
          key: userLicense?.key || key,
          activatedAt: userLicense?.activatedAt || null
        });
        
        console.log("Đã thu hồi bản quyền cho user:", userId);
      }
      
      alert("✅ Đã huỷ bản quyền cho mã: " + key);
      loadKeys(); // Tải lại danh sách
      
    } catch (error) {
      console.error("Lỗi khi huỷ bản quyền:", error);
      alert("Có lỗi xảy ra khi huỷ bản quyền: " + error.message);
    }
  }
}

// Hiển thị key
function loadKeys(){
  database.ref('licenseKeys').on('value', snap => {
    if(!snap.exists()){ document.getElementById('keysTable').innerHTML = '<p>Chưa có mã nào.</p>'; return; }
    const keys = snap.val();
    let html = `<table><thead><tr><th>Mã</th><th>Trạng thái</th><th>Ngày tạo</th><th>Ngày cấp</th><th>Người dùng</th><th>Email</th><th>Thao tác</th></tr></thead><tbody>`;
    Object.entries(keys).forEach(([k,v])=>{
      html += `<tr class="${v.used?'key-used':'key-unused'}">
        <td><code>${k}</code> <button class="copy-btn" data-key="${k}">Sao chép</button></td>
        <td>${v.used?'✅ Đã cấp':'🔄 Chưa cấp'}</td>
        <td>${v.generatedAt?new Date(v.generatedAt).toLocaleDateString('vi-VN'):'---'}</td>
        <td>${v.usedAt?new Date(v.usedAt).toLocaleDateString('vi-VN'):'---'}</td>
        <td>${v.usedBy||'---'}</td>
        <td>${v.usedByEmail||'---'}</td>
        <td>
          ${v.used ? `<button class="revoke-btn" data-key="${k}">Huỷ bản quyền</button>` : '---'}
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('keysTable').innerHTML = html;

    // Thêm event listener cho các nút sao chép
    document.querySelectorAll('.copy-btn').forEach(button => {
      button.addEventListener('click', (event) => {
        const key = event.target.getAttribute('data-key');
        copyKeyToClipboard(key);
      });
    });
    
    // Thêm event listener cho các nút huỷ bản quyền
    document.querySelectorAll('.revoke-btn').forEach(button => {
      button.addEventListener('click', (event) => {
        const key = event.target.getAttribute('data-key');
        revokeLicense(key);
      });
    });
  });
}

loadKeys();
</script>
</body>
</html>
