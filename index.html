<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý bản quyền</title>
  <style>
    body {font-family: Arial, sans-serif; background:#f4f6f8; margin:0; padding:20px;}
    h1 {text-align:center; margin-bottom:20px;}
    .form-container, .table-container {background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-bottom:20px;}
    .form-group {margin-bottom:15px;}
    label {display:block; margin-bottom:5px; font-weight:bold;}
    input {width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;}
    button {padding:10px 15px; background:#3498db; color:#fff; border:none; border-radius:4px; cursor:pointer;}
    button:hover {background:#2980b9;}
    table {width:100%; border-collapse:collapse; margin-top:10px;}
    th,td {border:1px solid #ddd; padding:10px; text-align:left;}
    th {background:#f2f2f2;}
    .key-used {background:#d4edda;}
    .key-unused {background:#fff3cd;}
    .copy-btn {
      padding: 5px 10px;
      margin-left: 10px;
      background: #5cb85c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .copy-btn:hover {
      background: #4cae4c;
    }
    .revoke-btn {
      padding: 5px 10px;
      margin-left: 5px;
      background: #d9534f;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8em;
    }
    .revoke-btn:hover {
      background: #c9302c;
    }
  </style>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
<h1>Quản lý mã bản quyền</h1>
<div class="form-container">
  <h3>📝 Tạo mã bản quyền mới</h3>
  <div class="form-group">
    <label for="keyCount">Số lượng mã</label>
    <input type="number" id="keyCount" value="5" min="1" max="1000">
  </div>
  <div class="form-group">
    <label for="keyLength">Độ dài mã (6-20 ký tự)</label>
    <input type="number" id="keyLength" value="8" min="6" max="20">
  </div>
  <button id="generateBtn">Tạo mã</button>
</div>
<div class="table-container">
  <h3>📋 Danh sách mã bản quyền</h3>
  <div id="keysTable"></div>
</div>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyBiaG-H9SzpYQqr3YgOODG4SM2WEqmhwb8",
  authDomain: "hoi-ccb.firebaseapp.com",
  databaseURL: "https://hoi-ccb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "hoi-ccb",
  storageBucket: "hoi-ccb.firebasestorage.app",
  messagingSenderId: "344971473549",
  appId: "1:344971473549:web:7d4db3d5d328401164e8c4"
};
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

function generateKey(len=8){
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let res = "";
  for(let i=0;i<len;i++) res += chars.charAt(Math.floor(Math.random()*chars.length));
  return res;
}

async function createKeys(){
  const count = parseInt(document.getElementById('keyCount').value)||1;
  const length = parseInt(document.getElementById('keyLength').value)||8;
  const timestamp = new Date().toISOString();

  for(let i=0;i<count;i++){
    const key = generateKey(length);
    const data = { generatedAt: timestamp, used:false, usedAt:null };
    await database.ref('licenseKeys/'+key).set(data);
  }
}

document.getElementById('generateBtn').addEventListener('click', createKeys);

function copyKeyToClipboard(key) {
  navigator.clipboard.writeText(key).then(() => {
    alert("Đã sao chép: " + key);
  }).catch(err => {
    console.error('Không thể sao chép mã: ', err);
  });
}

// HÀM HUỶ BẢN QUYỀN MỚI: Xử lý cả Key lẫn User
async function revokeLicense(key, btnElement) {
  if(confirm("Bạn có chắc chắn muốn huỷ bản quyền cho mã: " + key + "?\n\nUser đang sử dụng mã này sẽ bị khóa bản quyền ngay lập tức!")) {
    
    if(btnElement) {
      btnElement.disabled = true;
      btnElement.textContent = '⏳ Đang xử lý...';
    }
    
    try {
      // 1. Lấy thông tin hiện tại của key xem ai đang giữ nó
      const snapshot = await database.ref('licenseKeys/' + key).get();
      if (snapshot.exists()) {
        const keyData = snapshot.val();
        const userId = keyData.usedBy; // Lấy UID của user từ trường usedBy

        // 2. Nếu tìm thấy UID của user, tiến hành đặt licensed thành false ở nhánh users
        if (userId) {
          await database.ref('users/' + userId + '/license').update({
            licensed: false,
            key: null,
            activatedAt: null
          });
          console.log("Đã hủy trạng thái bản quyền của User: " + userId);
        }
      }

      // 3. Tiến hành reset trạng thái Key về chưa sử dụng
      await database.ref('licenseKeys/' + key).update({
        used: false,
        usedAt: null,
        usedBy: null,
        usedByEmail: null
      });
      
      alert("✅ Đã hủy bản quyền thành công!\n- Mã " + key + " đã sẵn sàng tái sử dụng.\n- Tài khoản người dùng liên quan đã bị khóa.");
      
    } catch (error) {
      console.error("Lỗi khi huỷ bản quyền:", error);
      alert("❌ Có lỗi xảy ra khi xử lý dữ liệu: " + error.message);
    }
  }
}

function initLicenseManager(){
  database.ref('licenseKeys').on('value', snap => {
    if(!snap.exists()){ 
      document.getElementById('keysTable').innerHTML = '<p>Chưa có mã nào.</p>'; 
      return; 
    }
    
    const keys = snap.val();
    let html = `<table><thead><tr><th>Mã</th><th>Trạng thái</th><th>Ngày tạo</th><th>Ngày cấp</th><th>UID Người dùng</th><th>Email</th><th>Thao tác</th></tr></thead><tbody>`;
    
    Object.entries(keys).forEach(([k,v])=>{
      html += `<tr class="${v.used?'key-used':'key-unused'}">
        <td><code>${k}</code> <button class="copy-btn" data-key="${k}">Sao chép</button></td>
        <td>${v.used?'✅ Đã cấp':'🔄 Chưa cấp'}</td>
        <td>${v.generatedAt?new Date(v.generatedAt).toLocaleDateString('vi-VN'):'---'}</td>
        <td>${v.usedAt?new Date(v.usedAt).toLocaleDateString('vi-VN'):'---'}</td>
        <td><small><code>${v.usedBy||'---'}</code></small></td>
        <td>${v.usedByEmail||'---'}</td>
        <td>
          ${v.used ? `<button class="revoke-btn" data-key="${k}">Huỷ bản quyền</button>` : '---'}
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('keysTable').innerHTML = html;

    document.querySelectorAll('.copy-btn').forEach(button => {
      button.onclick = (e) => {
        const key = e.currentTarget.getAttribute('data-key');
        copyKeyToClipboard(key);
      };
    });
    
    document.querySelectorAll('.revoke-btn').forEach(button => {
      button.onclick = (e) => {
        const key = e.currentTarget.getAttribute('data-key');
        revokeLicense(key, e.currentTarget); 
      };
    });
  });
}

initLicenseManager();
</script>
</body>
</html>
